version: 2
updates:
  # Python dependencies managed by uv (pip ecosystem)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      ai-sdks:
        patterns:
          - "openai"
          - "anthropic"
          - "ollama"
          - "tiktoken"
      dev-tooling:
        patterns:
          - "ruff"
          - "black"
          - "mypy"
          - "pytest*"
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(ci)"
